<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI智球 · 赛事看板</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:dark;
  --bg:#0f141a;--bar:#121820;--surface:#171e26;--surface-2:#1d2630;--card:#202933;
  --line:#283440;--line-soft:#23303b;--text:#edf3f8;--text-strong:#fff;--muted:#8fa2b5;
  --blue:#2d8cff;--blue-soft:#0d3c62;--green:#2bc276;--amber:#f4c95d;--red:#ef4e55;--shadow:0 14px 32px rgba(0,0,0,.22)
}
body.light{
  color-scheme:light;
  --bg:#eef3f8;--bar:#ffffff;--surface:#ffffff;--surface-2:#f4f7fb;--card:#ffffff;
  --line:#cfd9e5;--line-soft:#e1e8f0;--text:#172331;--text-strong:#0b1622;--muted:#52677a;
  --blue:#1769e0;--blue-soft:#e6f0ff;--green:#0f7a45;--amber:#9a6a00;--red:#c9363d;--shadow:0 10px 28px rgba(22,35,49,.10)
}
html,body{min-height:100%;font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{padding-top:72px}button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:72px;background:var(--bar);border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:220px minmax(260px,760px) auto;align-items:center;gap:18px;padding:0 28px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;white-space:nowrap}.logo svg{width:31px;height:31px}.logo small{font-size:12px;color:#9fb4c8;font-weight:700;margin-left:2px}
.search{height:42px;background:#1b232c;border:1px solid var(--line);border-radius:10px;padding:0 14px;display:flex;align-items:center;gap:10px;color:var(--muted);min-width:0;white-space:nowrap}.search input{width:100%;min-width:0;background:transparent;border:0;line-height:0;color:var(--text);font-size:15px}.search input::placeholder{color:var(--muted)}.search-label{white-space:nowrap;flex:none}
.auth{display:flex;align-items:center;gap:10px;justify-content:flex-end}.auth button{height:35px;border-radius:9px;padding:0 16px;font-weight:700;white-space:nowrap}.login{border:1px solid #3a4653;background:transparent;color:#dce7f0}.signup{border:1px solid var(--blue);background:var(--blue);color:white}.toggle-group{display:flex;height:35px;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface-2)}.toggle-group button{height:33px;border:0;border-radius:0;padding:0 10px;background:transparent;color:var(--muted);font-size:13px}.toggle-group button.active{background:var(--blue-soft);color:#49b2ff}.light .login{color:var(--text);border-color:#b8c6d5;background:#fff}.light .signup{box-shadow:0 5px 14px rgba(23,105,224,.18)}.light .toggle-group{background:#f3f7fb;border-color:#cad7e4}.light .toggle-group button{color:#52677a}.light .toggle-group button.active{background:#dbeafe;color:#0f5ec7}
.wrap{max-width:1540px;margin:0 auto;padding:24px 28px 56px}.board-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.board-head h1{font-size:24px;line-height:1.2;font-weight:800}.summary{color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap}
.league-tabs,.quick-filters{display:flex;gap:10px;overflow:auto;scrollbar-width:none}.league-tabs{margin-bottom:12px}.quick-filters{align-items:center;margin-bottom:22px;flex-wrap:wrap}
.tab{height:36px;padding:0 15px;border:0;background:transparent;color:#8fa3b7;border-radius:8px;font-size:14px;font-weight:700;white-space:nowrap}.tab.active{background:var(--blue-soft);color:#49b2ff}.light .tab{color:#5c7083}.light .tab.active{background:#dbeafe;color:#0f5ec7}
.quick-btn{height:36px;padding:0 15px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:#8fa3b7;font-size:14px;font-weight:700;white-space:nowrap}
.quick-btn.active{background:var(--blue-soft);color:#49b2ff;border-color:var(--blue-soft)}
.year-select{height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:#8fa3b7;padding:0 12px;font-size:14px;font-weight:700;outline:0;white-space:nowrap;cursor:pointer}.light .year-select{background:#fff;border-color:#cbd8e5;color:#172331}
.section-block{margin-top:22px}.section-title{font-size:17px;font-weight:800;margin-bottom:12px;color:var(--text-strong)}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.match-card{background:var(--card);border:1px solid var(--line);border-radius:8px;min-height:206px;padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;box-shadow:var(--shadow)}.match-card.has-odds{border-color:rgba(43,194,118,.65);box-shadow:0 0 0 1px rgba(43,194,118,.16),var(--shadow)}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;font-weight:700}.card-meta-left{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card-meta-actions{display:flex;align-items:center;gap:8px;flex:none}.fav-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-size:15px;line-height:1}.fav-btn.active{color:var(--amber);border-color:rgba(244,201,93,.55);background:rgba(244,201,93,.12)}.card-status{color:#77d59b}.odds-badge{display:inline-flex;align-items:center;height:22px;border-radius:999px;background:rgba(43,194,118,.14);border:1px solid rgba(43,194,118,.34);color:#74e1a5;padding:0 8px;font-size:12px;font-weight:800}.card-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}.card-team{text-align:center;min-width:0}.team-code{height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;margin-bottom:7px;color:#d8e2eb;font-weight:800}.team-code.text{font-size:13px;letter-spacing:.4px}.card-name{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-time{text-align:center;min-width:82px;color:#d8e2eb;font-size:13px;line-height:1.55}.scoreline{display:block;font-size:23px;line-height:1.2;color:#fff;font-weight:800;margin-bottom:3px}.card-ai{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:13px;color:#a7b6c5;line-height:1.5}.odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.odd-pill{border-radius:7px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);padding:6px 7px;font-size:12px;font-weight:800;text-align:center}.odd-home{color:var(--green)}.odd-draw{color:var(--amber)}.odd-away{color:#5aa7ff}.ai-line{display:flex;justify-content:space-between;gap:10px;margin-top:5px;font-weight:700}.ai-line span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ai-line span:last-child{color:var(--green);white-space:nowrap;font-size:12px}
/* 6维分析摘要样式 */
.analysis-summary{border-top:1px solid rgba(255,255,255,.08);padding-top:8px;margin-top:8px}.analysis-item{font-size:11px;color:var(--muted);line-height:1.6;padding:2px 0}.analysis-item.home{color:var(--green)}.analysis-item.draw{color:var(--amber)}.analysis-item.away{color:#5aa7ff}

.light .topbar{box-shadow:0 1px 0 rgba(18,32,46,.04),0 10px 26px rgba(18,32,46,.06)}.light .logo small{color:#64788b}.light .search{background:#f4f7fb;border-color:#cbd8e5;color:#52677a}.light .quick-btn{background:#fff;border-color:#cbd8e5;color:#172331}.light .quick-btn.active{background:#dbeafe;color:#0f5ec7}.light .match-card{background:#fff;border-color:#d7e1eb;box-shadow:0 10px 24px rgba(23,35,49,.08)}.light .match-card.has-odds{border-color:rgba(15,122,69,.55);box-shadow:0 0 0 1px rgba(15,122,69,.10),0 10px 24px rgba(23,35,49,.08)}.light .odds-badge{background:#e7f7ef;border-color:#b8e7ce;color:#0f7a45}.light .odd-pill{background:#f6f9fc;border-color:#e0e8f1}.light .card-meta{color:#657789}.light .card-status{color:#0f7a45}.light .team-code{color:#203142}.light .card-time{color:#34485c}.light .scoreline{color:#0b1622}.light .card-ai{border-top-color:#e2e9f1;color:#52677a}.light .ai-line span:last-child{color:#0f7a45}.light .analysis-summary .analysis-item{color:#52677a}.light .analysis-summary .analysis-item.home{color:#0f7a45}.light .analysis-summary .analysis-item.draw{color:#9a6a00}.light .analysis-summary .analysis-item.away{color:#1769e0}

@media(max-width:1180px){.topbar{grid-template-columns:190px 1fr auto}.cards{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.board-head{display:block}.summary{display:block;margin-top:10px}}
@media(max-width:760px){.detail-grid,.lineups{grid-template-columns:1fr}.detail-panel{margin:0 auto;padding:16px}.detail-modal{padding:10px}.detail-title{font-size:19px}}
@media(max-width:820px){.topbar{grid-template-columns:180px 1fr}.auth{grid-column:1/3;justify-content:flex-start}.topbar{height:116px;grid-template-rows:40px 42px}body{padding-top:116px}.search{grid-column:2;grid-row:1}.wrap{padding-top:18px}}
@media(max-width:680px){body{padding-top:158px}.topbar{height:158px;grid-template-columns:1fr;grid-template-rows:34px 40px 36px;padding:10px 14px}.logo{font-size:20px}.logo small{display:none}.auth{grid-column:1;grid-row:3;overflow:auto;justify-content:flex-start}.auth button{height:31px;padding:0 11px}.toggle-group{height:31px}.toggle-group button{height:29px;padding:0 9px}.search{grid-column:1;grid-row:2;height:40px}.wrap{padding:18px 14px 44px}.cards{grid-template-columns:1fr}.board-head h1{font-size:22px}.card-teams{gap:8px}.card-flag{font-size:27px}.card-name{font-size:15px}.card-time{min-width:66px}.tab{padding:0 12px}.backtop{right:14px;bottom:14px}}
@media(max-width:420px){.logo svg{width:28px;height:28px}.card-name{font-size:14px}}
</style>
</head>
<body>
<header class="topbar">
  <a class="logo" href="/"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M32 5 55 18v28L32 59 9 46V18L32 5Z" fill="#132337" stroke="#55a7ff" stroke-width="4"/><path d="M32 15v34M18 23l28 18M46 23 18 41" stroke="#8fd3ff" stroke-width="4" stroke-linecap="round"/></svg><span>AI智球</span><small>赛事研究</small></a>
  
  <label class="search"><span class="search-label">搜索</span><input id="searchInput" placeholder="球队、赛事、比赛时间、AI候选"></label>
  
  <div class="auth">
    <div class="toggle-group" aria-label="页面显示模式">
      <button data-theme="dark" class="active">黑夜</button>
      <button data-theme="light">白天</button>
    </div>
    <button class="login" id="loginBtn">登录</button><button class="signup" id="signupBtn">注册</button>
  </div>
</header>

<main class="wrap">
  <section>
    <div class="board-head">
      <h1>赛事看板</h1>
      <span class="summary" id="summary">加载中...</span>
    </div>
    
    <div class="league-tabs" id="leagueTabs">
      <button class="tab active" data-league="all">全部</button>
      <button class="tab" data-league="epl">英超</button>
      <button class="tab" data-league="laliga">西甲</button>
      <button class="tab" data-league="bundesliga">德甲</button>
      <button class="tab" data-league="seriea">意甲</button>
    </div>
    
    <div class="quick-filters" id="quickFilters">
      <select class="year-select" id="yearSelect" aria-label="赛季">
        <option value="all">全部赛季</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
      </select>
      <button class="quick-btn active" data-filter="all">全部</button>
      <button class="quick-btn" data-filter="finished">已结束</button>
      <button class="quick-btn" data-filter="upcoming">未开始</button>
      <button class="quick-btn" data-filter="has-odds">有赔率</button>
    </div>
    
    <div id="sections"></div>
  </section>
</main>

<script>
// 主题切换
document.querySelectorAll('.toggle-group[aria-label="页面显示模式"] button').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.theme;
    document.body.className = theme === 'light' ? 'light' : '';
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('theme', theme);
  });
});

// 加载保存的主题
const savedTheme = localStorage.getItem('theme') || 'dark';
if (savedTheme === 'light') {
  document.body.className = 'light';
}

// 联赛标签切换
document.querySelectorAll('#leagueTabs .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filterMatches();
  });
});

// 快速筛选切换
document.querySelectorAll('#quickFilters .quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.parentElement.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMatches();
  });
});

// 年份筛选
document.getElementById('yearSelect').addEventListener('change', () => {
  filterMatches();
});

// 搜索功能
document.getElementById('searchInput').addEventListener('input', (e) => {
  filterMatches(e.target.value);
});

// 全局变量
let allMatches = [];

// 加载分析数据
async function loadData() {
  try {
    const response = await fetch('analysis_results_all_matches_optimized.json');
    const data = await response.json();
    allMatches = data;
    renderMatches(allMatches);
    updateSummary(allMatches);
  } catch (error) {
    console.error('加载数据失败:', error);
    document.getElementById('summary').textContent = '加载数据失败';
  }
}

// 渲染比赛卡片
function renderMatches(matches) {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  
  if (matches.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">暂无比赛数据</div>';
    return;
  }
  
  const cardsHTML = matches.map(match => createMatchCard(match)).join('');
  container.innerHTML = `<div class="cards">${cardsHTML}</div>`;
}

// 创建比赛卡片
function createMatchCard(match) {
  const homeTeam = match.home_team || '未知';
  const awayTeam = match.away_team || '未知';
  const homeCode = homeTeam.substring(0, 3).toUpperCase();
  const awayCode = awayTeam.substring(0, 3).toUpperCase();
  
  // 获取欧赔
  const euro = match.european_odds || {};
  const homeOdds = euro.home_win_odds ? euro.home_win_odds.toFixed(2) : '-';
  const drawOdds = euro.draw_odds ? euro.draw_odds.toFixed(2) : '-';
  const awayOdds = euro.away_win_odds ? euro.away_win_odds.toFixed(2) : '-';
  
  // 获取ML预测
  const mlPred = match.ml_prediction || {};
  const predResult = mlPred.predicted_result || '-';
  const predConf = mlPred.confidence ? (mlPred.confidence * 100).toFixed(1) : '-';
  
  // 6维分析摘要
  const analysisSummary = getAnalysisSummary(match);
  
  return `
    <div class="match-card has-odds" onclick="showMatchDetail('${match.match_id}')">
      <div class="card-meta">
        <span class="card-meta-left">${match.competition || '未知赛事'}</span>
        <span class="card-status">✓ 已分析</span>
      </div>
      
      <div class="card-teams">
        <div class="card-team">
          <div class="team-code text">${homeCode}</div>
          <div class="card-name">${homeTeam}</div>
        </div>
        
        <div class="card-time">
          <span class="scoreline">vs</span>
          ${match.match_date || '--'}
        </div>
        
        <div class="card-team">
          <div class="team-code text">${awayCode}</div>
          <div class="card-name">${awayTeam}</div>
        </div>
      </div>
      
      <div class="card-ai">
        <strong>AI预测:</strong> ${predResult} (置信度: ${predConf}%)
        <div class="ai-line">
          <span>欧赔: ${homeOdds} / ${drawOdds} / ${awayOdds}</span>
          <span>查看详情 →</span>
        </div>
      </div>
      
      ${analysisSummary}
    </div>
  `;
}

// 获取6维分析摘要
function getAnalysisSummary(match) {
  let summaryHTML = '<div class="analysis-summary">';
  
  // 欧赔
  const euro = match.european_odds || {};
  if (euro.home_win_odds) {
    const homeProb = (1 / euro.home_win_odds * 100).toFixed(1);
    summaryHTML += `<div class="analysis-item home">欧赔: 主胜 ${homeProb}%</div>`;
  }
  
  // 大小球
  const ou = match.over_under || {};
  if (ou.over_under_line) {
    summaryHTML += `<div class="analysis-item draw">大小球: ${ou.over_under_line}球</div>`;
  }
  
  // 亚盘
  const ah = match.asian_handicap || {};
  if (ah.handicap !== undefined) {
    summaryHTML += `<div class="analysis-item away">亚盘: ${ah.handicap > 0 ? '+' : ''}${ah.handicap}</div>`;
  }
  
  summaryHTML += '</div>';
  return summaryHTML;
}

// 筛选比赛
function filterMatches(searchTerm = '') {
  let filtered = allMatches;
  
  // 联赛筛选
  const activeLeague = document.querySelector('#leagueTabs .tab.active').dataset.league;
  if (activeLeague !== 'all') {
    filtered = filtered.filter(m => (m.competition || '').toLowerCase().includes(activeLeague));
  }
  
  // 快速筛选
  const activeFilter = document.querySelector('#quickFilters .quick-btn.active').dataset.filter;
  if (activeFilter === 'finished') {
    filtered = filtered.filter(m => m.status === 'finished');
  } else if (activeFilter === 'upcoming') {
    filtered = filtered.filter(m => m.status === 'upcoming' || !m.status);
  } else if (activeFilter === 'has-odds') {
    filtered = filtered.filter(m => m.european_odds && m.european_odds.home_win_odds);
  }
  
  // 年份筛选
  const year = document.getElementById('yearSelect').value;
  if (year !== 'all') {
    filtered = filtered.filter(m => (m.match_date || '').startsWith(year));
  }
  
  // 搜索
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(m => 
      (m.home_team || '').toLowerCase().includes(term) ||
      (m.away_team || '').toLowerCase().includes(term) ||
      (m.competition || '').toLowerCase().includes(term)
    );
  }
  
  renderMatches(filtered);
  updateSummary(filtered);
}

// 更新摘要信息
function updateSummary(matches) {
  const summary = document.getElementById('summary');
  summary.textContent = `共 ${matches.length} 场比赛 · 最后更新: ${new Date().toLocaleString('zh-CN')}`;
}

// 显示比赛详情
function showMatchDetail(matchId) {
  window.location.href = `match.html?id=${matchId}`;
}

// 页面加载时执行
document.addEventListener('DOMContentLoaded', () => {
  loadData();
});
</script>
</body>
</html>
